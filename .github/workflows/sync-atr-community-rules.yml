# Weekly sync of the ATR community detection-rule corpus into examples/atr-community-rules/.
#
# Runs every Monday at 09:00 UTC (matching the ai-repo-health cadence) or on manual
# workflow_dispatch. Pulls the latest `agent-threat-rules` npm package, regenerates
# atr_community_policy_full.yaml via the committed sync_atr_rules.py, and opens a
# pull request for human review if the full policy has changed.
#
# Design notes:
#   * Opens a PR; never commits directly. Maintainers retain full veto.
#   * Uses the built-in gh CLI, no third-party GitHub Actions beyond pinned
#     actions/checkout and actions/setup-python / setup-node (Scorecard requirement).
#   * npm dependency is installed with --no-save so the main repo lock files stay clean.
#     The tarball's SHA-512 is verified against a committed value before install so
#     a same-version registry republish (supply-chain compromise) aborts the workflow.
#   * No changes to the curated atr_security_policy.yaml — that file remains hand-maintained.
#   * Runs sync WITHOUT --strict-regex: a small number of ATR rules use Unicode escape
#     sequences valid in PCRE/JS but not Python re; strict mode would abort the sync.
#     Invalid patterns are skipped with a WARNING and logged in the PR body.
#
# Scope limits: this workflow only updates one auto-synced YAML. It does not touch
# the curated policy, tests, or source code.

name: Sync ATR Community Rules

on:
  schedule:
    - cron: "0 9 * * 1" # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-atr-community-rules
  cancel-in-progress: false

jobs:
  sync:
    name: Regenerate full ATR policy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install --no-cache-dir --require-hashes -r agent-governance-python/requirements/ci-yaml.txt

      - name: Pull and verify ATR package
        id: atr
        env:
          # Pinned SHA-512 for agent-threat-rules@2.0.12 tarball published on
          # the npm registry. If the registry republishes the same version with
          # different bytes (compromise / typosquat / overwrite), the integrity
          # check below fails and the workflow aborts. Update this value
          # together with the version bump above. Obtain a fresh value via:
          #   curl -s https://registry.npmjs.org/agent-threat-rules/<ver> \
          #     | jq -r .dist.integrity
          ATR_VERSION: "2.0.12"
          ATR_INTEGRITY: "sha512-+9voboBnYRUx6E9PijhL1lgMBznoolkmS2sQ1Y9QFpGWIrVD50ekjSYmrduS+2ISSs676+tRA/v8V5b8qrn9uQ=="
        run: |
          set -euo pipefail
          # Fetch the registry metadata, pin the tarball URL by version, and
          # verify the downloaded tarball's SHA-512 against the committed
          # ``ATR_INTEGRITY`` value before installing. This detects a malicious
          # republish at the same version number (the threat that ``npm install
          # <pkg>@<ver>`` alone cannot detect without a lockfile).
          #
          # The integrity check only proves the bytes match what npm published.
          # It does NOT prove the published bytes are benign. ``--ignore-scripts``
          # below blocks lifecycle script execution (preinstall/install/
          # postinstall) so a compromised publisher cannot get RCE in a job
          # that holds contents:write + pull-requests:write + GITHUB_TOKEN
          # even if their bytes pass the SHA-512 gate.
          TARBALL_URL=$(curl -fsSL "https://registry.npmjs.org/agent-threat-rules/$ATR_VERSION" \
            | python -c "import sys,json; print(json.load(sys.stdin)['dist']['tarball'])")
          echo "Tarball URL: $TARBALL_URL"
          # Use mktemp so the tarball lives at an unpredictable per-run path —
          # defense-in-depth against TOCTOU on shared (e.g. self-hosted) runners.
          ATR_TARBALL=$(mktemp -t atr.XXXXXX.tgz)
          trap 'rm -f "$ATR_TARBALL"' EXIT
          curl -fsSL "$TARBALL_URL" -o "$ATR_TARBALL"
          ACTUAL_B64=$(openssl dgst -sha512 -binary "$ATR_TARBALL" | base64 -w0)
          ACTUAL_INTEGRITY="sha512-$ACTUAL_B64"
          if [ "$ACTUAL_INTEGRITY" != "$ATR_INTEGRITY" ]; then
            echo "::error::agent-threat-rules@$ATR_VERSION integrity mismatch." >&2
            echo "::error::  expected: $ATR_INTEGRITY" >&2
            echo "::error::  actual:   $ACTUAL_INTEGRITY" >&2
            echo "::error::Refuse to install — possible supply-chain compromise." >&2
            exit 1
          fi
          echo "Integrity OK ($ACTUAL_INTEGRITY)"
          # --ignore-scripts: even with integrity verified, do NOT execute
          # preinstall/install/postinstall hooks from the package. The sync
          # script only reads files under node_modules/agent-threat-rules/rules/
          # so package lifecycle execution is unnecessary.
          npm install --no-save --no-package-lock --ignore-scripts "$ATR_TARBALL" --silent
          PKG_VERSION=$(node -p "require('./node_modules/agent-threat-rules/package.json').version")
          if [ "$PKG_VERSION" != "$ATR_VERSION" ]; then
            echo "::error::Installed package reports version $PKG_VERSION, expected $ATR_VERSION" >&2
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Pulled and verified agent-threat-rules@$PKG_VERSION"

      - name: Regenerate full policy
        id: regen
        run: |
          set -euo pipefail
          # Note: intentionally NOT using --strict-regex here.
          # ATR v2.0.12+ contains a small number of rules with Unicode escape sequences
          # (e.g. \uE0000 tag characters) that are valid PCRE/JS but not Python re.
          # Strict mode would abort the sync; lenient mode skips them with a WARNING.
          python examples/atr-community-rules/sync_atr_rules.py \
            --atr-dir node_modules/agent-threat-rules/rules/ \
            --output examples/atr-community-rules/atr_community_policy_full.yaml \
            2>&1 | tee /tmp/sync_output.txt
          RULE_COUNT=$(python -c "import yaml,sys; d=yaml.safe_load(open(sys.argv[1])); print(len(d.get('rules', [])))" examples/atr-community-rules/atr_community_policy_full.yaml)
          SKIPPED=$(grep -c "^WARNING: skipping" /tmp/sync_output.txt || true)
          echo "rule_count=$RULE_COUNT" >> "$GITHUB_OUTPUT"
          echo "skipped_count=$SKIPPED" >> "$GITHUB_OUTPUT"

      - name: Detect changes
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet --exit-code examples/atr-community-rules/atr_community_policy_full.yaml; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes — skipping PR."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="bot/sync-atr-${{ steps.atr.outputs.version }}-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add examples/atr-community-rules/atr_community_policy_full.yaml
          git commit -m "chore(examples/atr-community-rules): sync ATR v${{ steps.atr.outputs.version }}"
          git push -u origin "$BRANCH"

          BODY="Automated weekly sync of the ATR community detection-rule corpus.

          - Source: agent-threat-rules@${{ steps.atr.outputs.version }} on npm
          - Patterns in refreshed atr_community_policy_full.yaml: ${{ steps.regen.outputs.rule_count }}
          - Patterns skipped (invalid Python regex): ${{ steps.regen.outputs.skipped_count }}

          This PR is opened for human review. The curated atr_security_policy.yaml is NOT modified."

          if gh pr create \
            --title "chore(examples/atr-community-rules): sync ATR v${{ steps.atr.outputs.version }}" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH"; then
            echo "PR created successfully."
          else
            echo "::warning::Could not create PR automatically. Branch '$BRANCH' has been pushed."
            echo "::warning::Create the PR manually: https://github.com/${{ github.repository }}/compare/main...$BRANCH"
          fi
