name: workflow-lint

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'scripts/**'
      - 'tests/ci/**'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install actionlint
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash -o actionlint-download.bash
          echo "221d1d16c03e4e4fcd867de34104e8d479bdce20ccdfa553b9a5c0dc29bf6af2  actionlint-download.bash" | sha256sum -c -
          bash actionlint-download.bash 1.7.7
          rm actionlint-download.bash
          sudo mv actionlint /usr/local/bin/actionlint
      - name: Run actionlint
        env:
          SHELLCHECKRC: ${{ github.workspace }}/.shellcheckrc
        run: |
          actionlint -color \
            -ignore 'unknown permission scope "models"' \
            -ignore 'undefined variable "pattern"' \
            -ignore 'SC2016' \
            -ignore 'SC2001' \
            -ignore 'SC2193'

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run shellcheck on workflow shell
        env:
          SHELLCHECKRC: ${{ github.workspace }}/.shellcheckrc
        run: |
          set -euo pipefail
          python3 scripts/extract_workflow_shell.py .github/workflows > workflow-shell-extracted.sh
          shellcheck -s bash workflow-shell-extracted.sh
          rm workflow-shell-extracted.sh

  inline-script-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install --no-cache-dir --require-hashes -r agent-governance-python/requirements/ci-test.txt
      - name: Run inline script tests
        run: pytest tests/ci/ -v
