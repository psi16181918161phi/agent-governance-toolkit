name: Secret Scanning

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'agent-governance-python/notebooks/**'
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # The gitleaks *action* requires a paid GITLEAKS_LICENSE for org
      # repos. The gitleaks *CLI* is MIT-licensed and free. We install
      # the CLI directly to avoid license-key management overhead.
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            gitleaks detect --source . --log-opts "${BASE_SHA}..${HEAD_SHA}" --verbose
          else
            gitleaks detect --source . --verbose
          fi

      - name: Scan for high-entropy strings
        run: |
          echo "=== Scanning for potential secrets ==="
          FOUND=0

          # Check for hardcoded API keys/tokens (common patterns)
          PATTERNS=(
            '[A-Za-z0-9_-]{32,}==$'
            'sk-[A-Za-z0-9]{48}'
            'ghp_[A-Za-z0-9]{36}'
            'gho_[A-Za-z0-9]{36}'
            'AKIA[0-9A-Z]{16}'
            'xox[bsrp]-[A-Za-z0-9-]{10,}'
          )

          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rn --include='*.py' --include='*.ts' --include='*.js' \
              --include='*.yaml' --include='*.yml' --include='*.json' \
              --include='*.env*' --include='*.cfg' --include='*.ini' \
              -E "$pattern" . \
              --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist \
              --exclude-dir=__pycache__ --exclude='*.lock' --exclude='package-lock.json' \
              2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "::warning::Potential secrets found matching pattern: $pattern"
              echo "$MATCHES" | head -5 | sed 's/:.*/:***REDACTED***/'
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo "::warning::Review the above matches for potential secret exposure"
          else
            echo "OK: No high-entropy strings matching known secret patterns"
          fi
