# Posts a single commit status reflecting whether a PR has an approving
# review from a maintainer. "Maintainer" is resolved from native repo RBAC:
# a collaborator whose role is `maintain` or `admin` (read via role_name —
# the legacy `permission` field collapses maintain -> write).
#
# A commit status (not a per-run check) is used on purpose: statuses de-dupe
# by context, so the `pull_request_review` run on approval OVERWRITES the
# awaiting status from the `pull_request_target` run at PR-open. That yields
# a single row that flips to success automatically, instead of a stale red
# check-run lingering next to the freshly-passed one.
#
# AI-only approvals, bot approvals, and the author's own approval do NOT count.
# Context: PRs #357 and #362 were auto-merged without maintainer review,
# reintroducing shell=True (CWE-78) that was previously fixed.

name: Maintainer approval

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read

# Register `policy/maintainer-approval` (the status context below) as the
# required status check in branch protection — not this workflow's job name.
env:
  STATUS_CONTEXT: policy/maintainer-approval

# SECURITY: pull_request_target runs in BASE context. Never checkout PR head ref.
jobs:
  maintainer-approval-status:
    name: maintainer-approval-status
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read    # pulls.listReviews
      statuses: write        # repos.createCommitStatus
    steps:
      - name: Evaluate and post maintainer-approval status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const sha = pr.head.sha;
            const ctx = process.env.STATUS_CONTEXT;

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            // Distinct human approvers, excluding the PR author (no self-approval)
            // and any bot/service account (type !== 'User').
            const approvers = [...new Set(
              reviews
                .filter((r) => r.state === 'APPROVED' && r.user && r.user.type === 'User' && r.user.login !== author)
                .map((r) => r.user.login)
            )];
            core.info(`PR author: @${author}`);
            core.info(`Approving (non-author, human): ${approvers.join(', ') || '(none)'}`);

            // A maintainer is anyone whose repo role is maintain or admin.
            // NOTE: use `role_name`, not `permission` — the legacy `permission`
            // field only returns admin/write/read, so a Maintain-role user (and,
            // under the Actions token, even an admin) shows up as "write".
            let approvingMaintainer = null;
            for (const login of approvers) {
              try {
                const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  username: login,
                });
                core.info(`  @${login}: permission=${perm.permission} role_name=${perm.role_name}`);
                if (perm.role_name === 'admin' || perm.role_name === 'maintain') {
                  approvingMaintainer = login;
                  break;
                }
              } catch (e) {
                core.info(`  @${login}: permission lookup failed: ${e.status || ''} ${e.message}`);
              }
            }

            const state = approvingMaintainer ? 'success' : 'failure';
            const description = approvingMaintainer
              ? `Approved by @${approvingMaintainer} (Maintain+)`
              : 'Awaiting approval from a maintainer (Maintain or Admin role)';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: ctx,
              description,
              target_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            core.info(`Posted status ${ctx}=${state} on ${sha.slice(0, 8)}: ${description}`);
