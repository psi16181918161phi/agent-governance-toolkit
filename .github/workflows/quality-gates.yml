name: Quality Gates

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  no-stubs:
    name: No Stubs/TODOs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          chmod +x scripts/ci/no-stubs.sh
          scripts/ci/no-stubs.sh "origin/$BASE_REF"

  no-custom-crypto:
    name: No Unauthorized Crypto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          chmod +x scripts/ci/no-custom-crypto.sh
          scripts/ci/no-custom-crypto.sh "origin/$BASE_REF"

  security-audit-required:
    name: Security Audit Required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          chmod +x scripts/ci/security-audit-required.sh
          scripts/ci/security-audit-required.sh "origin/$BASE_REF"

  no-unauthed-registration:
    name: No Unauthenticated Registration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          chmod +x scripts/ci/no-unauthed-registration.sh
          scripts/ci/no-unauthed-registration.sh "origin/$BASE_REF"

  vendored-patch-audit:
    name: Dependency Audit Trail
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # Routine Dependabot patch/minor bumps cannot author an audit doc, so
      # exempt them (issue #2975). Resolve the bump type from Dependabot
      # metadata; the step is skipped (and the gate enforced normally) for
      # every non-Dependabot PR.
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        if: github.actor == 'dependabot[bot]'
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
      - env:
          BASE_REF: ${{ github.base_ref }}
          PR_ACTOR: ${{ github.actor }}
          DEPENDABOT_UPDATE_TYPE: ${{ steps.dependabot-metadata.outputs.update-type }}
        run: |
          chmod +x scripts/ci/vendored-patch-audit.sh
          scripts/ci/vendored-patch-audit.sh "origin/$BASE_REF"
