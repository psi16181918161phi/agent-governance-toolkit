site_name: Agent Governance Toolkit
site_description: Governance, trust, identity, and compliance for AI agents
site_url: https://microsoft.github.io/agent-governance-toolkit
repo_url: https://github.com/microsoft/agent-governance-toolkit
repo_name: microsoft/agent-governance-toolkit
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  logo: assets/agent-governance-toolkit.svg
  favicon: assets/agent-governance-toolkit.svg
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
    - header.autohide
  icon:
    repo: fontawesome/brands/github
  font:
    text: Segoe UI, system-ui, -apple-system, sans-serif
    code: Cascadia Code, JetBrains Mono, monospace

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/microsoft/agent-governance-toolkit
  generator: false

extra_css:
  - stylesheets/mslearn.css

